name: chatwoot-platform
label: Chatwoot
kind: platform
version: 1.0.0
description: >
  Chatwoot Agent Bot adapter for Hermes Agent.

  Runs an aiohttp webhook receiver that Chatwoot's Agent Bot posts inbound
  customer messages to. Hermes processes each message and replies through
  the Chatwoot Application API (message_type=outgoing), which Chatwoot then
  relays out to the original channel (e.g. Zalo via zca-bridge).

  Auto-handoff (mute): when a human agent replies in Chatwoot the
  conversation status flips to "open" and the bot goes silent. A "mute-ai"
  label can also be applied manually to mute the bot while still pending.

  No external SDK — only httpx and aiohttp, both already Hermes deps.
author: Tino / tinovn
# ``requires_env`` / ``optional_env`` entries are surfaced in the
# ``hermes config`` UI via the platform-plugin env var injector in
# ``hermes_cli/config.py``.
requires_env:
  - name: CHATWOOT_BASE_URL
    description: "Chatwoot base URL (e.g. http://127.0.0.1:3000)"
    prompt: "Chatwoot base URL"
    password: false
  - name: CHATWOOT_API_ACCESS_TOKEN
    description: "Chatwoot agent Access Token (Profile Settings -> Access Token)"
    prompt: "Chatwoot API access token"
    password: true
  - name: CHATWOOT_ACCOUNT_ID
    description: "Chatwoot account id (usually 1)"
    prompt: "Chatwoot account id"
    password: false
optional_env:
  - name: CHATWOOT_WEBHOOK_SECRET
    description: "Shared secret Chatwoot sends in X-Chatwoot-Webhook-Token (recommended)"
    prompt: "Webhook secret (optional)"
    password: true
  - name: CHATWOOT_PLUGIN_HOST
    description: "Host the webhook receiver binds to (default: 127.0.0.1)"
    prompt: "Plugin bind host"
    password: false
  - name: CHATWOOT_PLUGIN_PORT
    description: "Port the webhook receiver listens on (default: 8088)"
    prompt: "Plugin port"
    password: false
  - name: CHATWOOT_MUTE_LABEL
    description: "Conversation label that mutes the bot (default: mute-ai)"
    prompt: "Mute label"
    password: false
  - name: CHATWOOT_BOT_REPLY_STATUSES
    description: "Comma-sep conversation statuses the bot WILL reply to (default: pending)"
    prompt: "Reply statuses"
    password: false
  - name: CHATWOOT_ALLOWED_USERS
    description: "Comma-separated Chatwoot contact ids allowed (empty = use allow-all flag)"
    prompt: "Allowed contact ids"
    password: false
  - name: CHATWOOT_ALLOW_ALL_USERS
    description: "Allow any contact to talk to the bot (1/true/yes). Default: true for CSKH"
    prompt: "Allow all users? (true/false)"
    password: false
  - name: CHATWOOT_HOME_CHANNEL
    description: "Default conversation id for cron / notification delivery (optional)"
    prompt: "Home conversation id (or empty)"
    password: false
